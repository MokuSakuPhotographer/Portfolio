<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MokuSaku | Photo & Videographer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      html {
        scrollbar-gutter: stable;
      }
      /* === SONY風ダークテーマ定義 === */
      :root {
        --bg-main: #1a1a1a;
        --bg-dark: #111111;
        --bg-header: rgba(30, 30, 30, 0.95);
        --text-primary: #f0f0f0;
        --text-secondary: #a0a0a0;
        --accent-orange: #ff4d00;
        --border-color: #333333;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        color: var(--text-primary);
        background-color: var(--bg-main);
        line-height: 1.6;
        scroll-behavior: smooth;
        position: relative;
        min-height: 100vh; /* 画面の高さが足りなくても背景を維持します */
      }

      /* === 追加：背景画像を薄く敷く設定 === */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw; /* 画面幅に固定 */
        height: 100vh; /* 画面の高さに固定 */
        background-image: url("images/Camera_a.png");
        background-size: cover;
        background-position: center;
        opacity: 0.15;
        z-index: -2;
        pointer-events: none;
      }

      /* === 追従型ナビゲーション === */
      header {
        position: sticky;
        top: 0;
        background-color: var(--bg-header);
        border-bottom: 1px solid var(--border-color);
        z-index: 1000;
        backdrop-filter: blur(10px);
        transition: top 0.3s ease;
        animation: slideDown 0.8s ease-out forwards;
        transform: translateY(-100%);
      }

      /* ヘッダー内のレイアウト調整 */
      .header-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        box-sizing: border-box;
      }

      /* サイトタイトルのスタイル（筆記体） */
      .site-title {
        font-family: "Dancing Script", cursive;
        font-size: 1.8rem;
        color: var(--accent-orange); /* オレンジ色に統一 */
        text-decoration: none;
        white-space: nowrap;
        transition: color 0.3s ease;
      }
      /* ホバーした時は白く光るように変更 */
      .site-title:hover {
        color: var(--text-primary);
      }

      nav {
        display: flex;
        justify-content: flex-end;
        flex-wrap: wrap;
        padding: 15px 0;
      }
      nav a {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: var(--text-primary);
        margin: 5px 15px;
        font-size: 0.85rem;
        font-weight: bold;
        letter-spacing: 0.05em;
        transition: all 0.3s ease;
        position: relative;
      }
      nav a:hover {
        color: var(--accent-orange);
      }
      nav a::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background-color: var(--accent-orange);
        transition: width 0.3s ease;
      }
      nav a:hover::after {
        width: 100%;
      }

      /* アイコンの調整 */
      .nav-icon {
        width: 16px;
        height: 16px;
        margin-right: 8px;
        transition: filter 0.3s ease;
      }
      nav a:hover .nav-icon {
        filter: brightness(0) saturate(100%) invert(39%) sepia(93%)
          saturate(3501%) hue-rotate(10deg) brightness(102%) contrast(106%);
      }

      /* スマホ表示時のヘッダー調整 */
      @media (max-width: 850px) {
        .header-container {
          flex-direction: column;
          padding-top: 15px;
        }
        nav {
          justify-content: center;
          padding-top: 5px;
          padding-bottom: 10px;
        }
        .site-title {
          font-size: 2.2rem;
        }
      }

      /* === メインビジュアル === */
      .hero-section {
        position: relative;
        width: 100%;
        height: 75vh;
        overflow: hidden;
        background-color: #000;
      }
      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        opacity: 0;
        transition: opacity 2s ease-in-out;
        filter: brightness(0.85);
      }
      .slide.active {
        opacity: 1;
      }

      /* === ウェルカムテキスト === */
      .welcome-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
        color: #fff;
        text-align: center;
        font-family: "Dancing Script", cursive;
        font-size: 5.5rem;
        line-height: 1.2;
        text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        width: 100%;
        opacity: 0;
        animation: fadeInWelcome 2s ease-out 0.8s forwards;
      }

      .welcome-highlight {
        color: var(--accent-orange);
      }

      @keyframes fadeInWelcome {
        from {
          opacity: 0;
          transform: translate(-50%, -40%);
        }
        to {
          opacity: 0.7;
          transform: translate(-50%, -50%);
        }
      }

      @media (max-width: 850px) {
        .welcome-text {
          font-size: 2.5rem;
        }
      }

      /* スライドショーのインジケーター */
      .slide-indicators {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 10;
        padding: 10px;
      }
      .dot {
        width: 12px;
        height: 12px;
        background-color: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        cursor: pointer;
        transition:
          background-color 0.3s ease,
          transform 0.2s ease;
      }
      .dot.active {
        background-color: var(--accent-orange);
        box-shadow: 0 0 5px rgba(255, 77, 0, 0.5);
      }
      .dot:hover {
        transform: scale(1.2);
        background-color: rgba(255, 77, 0, 0.7);
      }

      /* === もっと写真を見るボタン === */
      .btn-container {
        text-align: center;
        padding: 60px 20px 100px;
        /* 背景色を透明にして、背後の薄い画像を見せる */
        background-color: transparent;
        position: relative;
      }
      .btn-gallery {
        display: inline-block;
        padding: 16px 45px;
        background-color: transparent;
        color: var(--accent-orange);
        text-decoration: none;
        border: 2px solid var(--accent-orange);
        border-radius: 2px;
        font-weight: bold;
        font-size: 1rem;
        letter-spacing: 0.1em;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        z-index: 1;
      }
      .btn-gallery::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 0%;
        height: 100%;
        background-color: var(--accent-orange);
        transition: width 0.3s ease-in-out;
        z-index: -1;
      }
      .btn-gallery:hover {
        color: #fff;
        box-shadow: 0 0 15px rgba(255, 77, 0, 0.5);
        transform: translateY(-3px);
      }
      .btn-gallery:hover::before {
        width: 100%;
      }

      /* === スクロールアニメーション用クラス === */
      .js-scroll-trigger {
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.8s ease-out,
          transform 0.8s ease-out;
      }
      .js-scroll-trigger.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes slideDown {
        to {
          transform: translateY(0);
        }
      }

      /* === TOPへ戻るボタンのスタイル === */
      .page-top-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        background-color: var(--bg-dark);
        border: 2px solid var(--border-color);
        border-radius: 50%;
        color: var(--text-primary);
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.2rem;
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }
      .page-top-btn.is-show {
        opacity: 1;
        visibility: visible;
      }
      .page-top-btn:hover {
        background-color: var(--accent-orange);
        border-color: var(--accent-orange);
        color: #fff;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(255, 77, 0, 0.4);
      }
      /* === フッター（コピーライト）のスタイル === */
      .site-footer {
        text-align: center;
        padding: 20px 10px;
        margin-top: 60px;
        border-top: 1px solid var(--border-color);
        font-size: 0.8rem;
        color: var(--text-secondary);
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-container">
        <a href="index.html" class="site-title">MokuSaku's Photo booth</a>
        <nav>
          <a href="profile.html"
            ><img
              src="images/Profile.png?v=2"
              class="nav-icon"
              alt=""
            />Profile</a
          >
          <a href="Policy.html"
            ><img
              src="images/Policy.png?v=2"
              class="nav-icon"
              alt=""
            />Policy</a
          >
          <a href="event.html"
            ><img
              src="images/Calendar.png?v=2"
              class="nav-icon"
              alt=""
            />Schedule</a
          >
          <a href="gallery.html"
            ><img
              src="images/Gallery.png?v=2"
              class="nav-icon"
              alt=""
            />Gallery</a
          >
          <a href="equipment.html"
            ><img src="images/Gear.png?v=2" class="nav-icon" alt="" />Gear</a
          >
          <a href="contact.html"
            ><img
              src="images/Contact.png?v=2"
              class="nav-icon"
              alt=""
            />Contact</a
          >
        </nav>
      </div>
    </header>

    <div class="hero-section">
      <div
        class="slide active"
        style="background-image: url(&quot;images/DSC04616.png&quot;)"
      ></div>
      <div
        class="slide"
        style="background-image: url(&quot;images/DSC00587_20230401.png&quot;)"
      ></div>
      <div
        class="slide"
        style="background-image: url(&quot;images/DSC00252_20230218.png&quot;)"
      ></div>
      <div
        class="slide"
        style="background-image: url(&quot;images/DSC01866.png&quot;)"
      ></div>
      <div
        class="slide"
        style="
          background-image: url(&quot;images/DSC02215-Enhanced-NR.png&quot;);
        "
      ></div>

      <div class="welcome-text">
        Welcome to<br /><span class="welcome-highlight"
          >MokuSaku's Photo booth</span
        >
      </div>

      <div class="slide-indicators">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="btn-container">
      <a href="gallery.html" class="btn-gallery js-scroll-trigger"
        >MORE PHOTOS</a
      >
    </div>
    <footer class="site-footer">
      &copy; 2026 MokuSaku. All Rights Reserved.<br />
      当サイトのすべてのコンテンツの無断転載を禁じます。
    </footer>
    <a href="#" class="page-top-btn" id="pageTopBtn">▲</a>

    <script>
      // --- スライドショーの制御 ---
      const slides = document.querySelectorAll(".slide");
      const dots = document.querySelectorAll(".dot");
      let currentSlide = 0;
      let slideInterval;

      function goToSlide(index) {
        slides[currentSlide].classList.remove("active");
        dots[currentSlide].classList.remove("active");
        currentSlide = index;
        slides[currentSlide].classList.add("active");
        dots[currentSlide].classList.add("active");
      }

      function nextSlide() {
        let nextIndex = (currentSlide + 1) % slides.length;
        goToSlide(nextIndex);
      }

      function startSlideShow() {
        clearInterval(slideInterval);
        slideInterval = setInterval(nextSlide, 5000);
      }

      function stopSlideShow() {
        clearInterval(slideInterval);
      }

      dots.forEach((dot, index) => {
        dot.addEventListener("mouseenter", stopSlideShow);
        dot.addEventListener("mouseleave", startSlideShow);
        dot.addEventListener("click", () => {
          goToSlide(index);
        });
      });

      startSlideShow();

      // --- スクロールアニメーションの制御 ---
      const scrollTriggers = document.querySelectorAll(".js-scroll-trigger");
      const cb = function (entries, observer) {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      };
      const io = new IntersectionObserver(cb, { rootMargin: "-10% 0px" });
      scrollTriggers.forEach((trigger) => {
        io.observe(trigger);
      });

      // --- TOPへ戻るボタンの表示制御 ---
      const pageTopBtn = document.getElementById("pageTopBtn");
      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          pageTopBtn.classList.add("is-show");
        } else {
          pageTopBtn.classList.remove("is-show");
        }
      });
      // --- ヘッダーのスクロール（自動隠し）制御 ---
      const header = document.querySelector("header");
      let lastScrollY = window.scrollY;

      window.addEventListener("scroll", () => {
        const currentScrollY = window.scrollY;
        if (Math.abs(currentScrollY - lastScrollY) < 60) {
          return;
        }
        // 下にスクロール ＆ 上から50px以上スクロールしている場合のみ隠す
        if (currentScrollY > lastScrollY && currentScrollY > 50) {
          header.style.top = "-150px"; // ヘッダーの高さ分、画面外（上）に移動させる
        } else {
          // 上に少しでもスクロールした時、または一番上の時は表示する
          header.style.top = "0px";
        }

        lastScrollY = currentScrollY;
      });
      // --- TOPへ戻るボタンのスムーズスクロール制御 ---
      pageTopBtn.addEventListener("click", (e) => {
        e.preventDefault(); // 一瞬で一番上に飛ぶ標準の動作をキャンセル
        window.scrollTo({
          top: 0,
          behavior: "smooth", // 滑らかなスクロールを指定
        });
      });
    </script>
  </body>
</html>
