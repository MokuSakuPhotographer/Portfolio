<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | MokuSaku</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      html {
        scrollbar-gutter: stable;
      }
      /* === SONY風ダークテーマ定義 === */
      :root {
        --bg-main: #1a1a1a;
        --bg-dark: #111111;
        --bg-header: rgba(30, 30, 30, 0.95);
        --text-primary: #f0f0f0;
        --text-secondary: #a0a0a0;
        --accent-orange: #ff4d00;
        --border-color: #333333;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        color: var(--text-primary);
        background-color: var(--bg-main);
        line-height: 1.6;
        scroll-behavior: smooth;
        position: relative;
        min-height: 100vh;
      }

      /* === 背景画像を薄く敷く設定 === */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-image: url("images/Camera_a.png");
        background-size: cover;
        background-position: center;
        opacity: 0.15;
        z-index: -2;
        pointer-events: none;
      }

      /* === 追従型ナビゲーション === */
      header {
        position: sticky;
        top: 0;
        background-color: var(--bg-header);
        border-bottom: 1px solid var(--border-color);
        z-index: 1000;
        backdrop-filter: blur(10px);
        transition: top 0.3s ease;
      }

      .header-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        box-sizing: border-box;
      }

      /* ▼ サイトタイトルの色統一 ▼ */
      .site-title {
        font-family: "Dancing Script", cursive;
        font-size: 1.8rem;
        color: var(--accent-orange);
        text-decoration: none;
        white-space: nowrap;
        transition: color 0.3s ease;
      }
      .site-title:hover {
        color: var(--text-primary);
      }

      nav {
        display: flex;
        justify-content: flex-end;
        flex-wrap: wrap;
        padding: 15px 0;
      }
      nav a {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: var(--text-primary);
        margin: 5px 15px;
        font-size: 0.85rem;
        font-weight: bold;
        letter-spacing: 0.05em;
        transition: all 0.3s ease;
        position: relative;
      }
      nav a:hover {
        color: var(--accent-orange);
      }
      nav a::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background-color: var(--accent-orange);
        transition: width 0.3s ease;
      }
      nav a:hover::after {
        width: 100%;
      }

      .nav-icon {
        width: 16px;
        height: 16px;
        margin-right: 8px;
        transition: filter 0.3s ease;
      }
      nav a:hover .nav-icon {
        filter: brightness(0) saturate(100%) invert(39%) sepia(93%)
          saturate(3501%) hue-rotate(10deg) brightness(102%) contrast(106%);
      }

      @media (max-width: 850px) {
        .header-container {
          flex-direction: column;
          padding-top: 15px;
        }
        nav {
          justify-content: center;
          padding-top: 5px;
          padding-bottom: 10px;
        }
        .site-title {
          font-size: 2.2rem;
        }
      }

      /* === ギャラリー専用スタイル === */
      .gallery-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 80px 20px;
      }

      .section-title {
        text-align: center;
        font-size: 2.5rem;
        letter-spacing: 0.15em;
        margin-bottom: 60px;
        color: #fff;
        text-transform: uppercase;
        font-weight: 300;
      }
      .section-title span {
        color: var(--accent-orange);
        font-style: italic;
      }

      /* --- 1. 写真（美しいタイル状レイアウト・15枚用） --- */
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 250px;
        gap: 15px;
        margin-bottom: 100px;
        grid-auto-flow: dense; /* 空白を自動で隙間なく埋める魔法の設定 */
      }

      .photo-item {
        position: relative;
        overflow: hidden;
        border-radius: 2px;
        background-color: #000;
      }

      .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(80%) contrast(1.1);
        transition:
          transform 0.6s cubic-bezier(0.25, 1, 0.5, 1),
          filter 0.6s ease;
        cursor: zoom-in;
      }

      .photo-item:hover img {
        filter: grayscale(0%) contrast(1.05);
        transform: scale(1.05);
      }

      /* 大きすぎるものをなくし、縦長・横長・正方形をバランスよく散りばめる */
      .photo-item:nth-child(1) {
        grid-column: span 2;
        grid-row: span 2;
      } /* 左上の基準となる少し大きめの1枚 */
      .photo-item:nth-child(4) {
        grid-row: span 2;
      } /* 縦長 */
      .photo-item:nth-child(5) {
        grid-column: span 2;
      } /* 横長 */
      .photo-item:nth-child(8) {
        grid-row: span 2;
      } /* 縦長 */
      .photo-item:nth-child(10) {
        grid-column: span 2;
      } /* 横長 */
      .photo-item:nth-child(13) {
        grid-column: span 2;
      } /* 横長 */
      .photo-item:nth-child(15) {
        grid-column: span 2;
      } /* 横長 */

      @media (max-width: 768px) {
        .photo-grid {
          grid-template-columns: repeat(2, 1fr);
          grid-auto-rows: 200px;
        }
        .photo-item {
          grid-column: span 1 !important;
          grid-row: span 1 !important;
        }
        /* スマホ時は横長をアクセントとして配置 */
        .photo-item:nth-child(1),
        .photo-item:nth-child(5),
        .photo-item:nth-child(10),
        .photo-item:nth-child(15) {
          grid-column: span 2 !important;
        }
      }

      /* --- 2. 動画（YouTube埋め込み） --- */
      .video-section {
        display: flex;
        flex-direction: column;
        gap: 60px;
      }

      .video-wrapper {
        position: relative;
        width: 80%;
        border-left: 4px solid var(--accent-orange);
        padding-left: 20px;
        box-sizing: border-box;
      }

      .video-wrapper:nth-child(even) {
        margin-left: auto;
        border-left: none;
        border-right: 4px solid var(--accent-orange);
        padding-left: 0;
        padding-right: 20px;
        text-align: right;
      }

      .video-title {
        font-size: 1.2rem;
        color: #fff;
        margin-bottom: 15px;
        letter-spacing: 0.1em;
      }

      .video-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: 4px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        background-color: #000;
      }
      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }

      @media (max-width: 768px) {
        .video-wrapper {
          width: 100%;
        }
      }

      /* === ライトボックス（画像拡大アニメーション）用スタイル === */
      .lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 2000;
        pointer-events: none;
      }
      .lightbox.active {
        pointer-events: auto;
      }
      .lightbox-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(8px);
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .lightbox.active .lightbox-bg {
        opacity: 1;
      }
      #lightbox-img {
        position: absolute;
        z-index: 2001;
        object-fit: cover;
        cursor: zoom-out;
        border-radius: 2px;
      }
      .lightbox-close {
        position: absolute;
        top: 20px;
        right: 30px;
        color: #fff;
        font-size: 40px;
        cursor: pointer;
        z-index: 2002;
        opacity: 0;
        transition:
          opacity 0.4s ease,
          color 0.3s ease;
        line-height: 1;
      }
      .lightbox.active .lightbox-close {
        opacity: 1;
        transition-delay: 0.3s;
      }
      .lightbox-close:hover {
        color: var(--accent-orange);
      }
      .lightbox-spinner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent-orange);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        z-index: 2000;
        display: none;
      }
      @keyframes spin {
        100% {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      /* === スクロールアニメーション用クラス === */
      .js-scroll-trigger {
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.8s ease-out,
          transform 0.8s ease-out;
      }
      .js-scroll-trigger.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* === TOPへ戻るボタンのスタイル === */
      .page-top-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        background-color: var(--bg-dark);
        border: 2px solid var(--border-color);

        color: var(--text-primary);
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.2rem;
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }
      .page-top-btn.is-show {
        opacity: 1;
        visibility: visible;
      }
      .page-top-btn:hover {
        background-color: var(--accent-orange);
        border-color: var(--accent-orange);
        color: #fff;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(255, 77, 0, 0.4);
      }
    </style>
  </head>

    <div id="lightbox" class="lightbox">

      <div class="lightbox-close">×</div>

    <script>
      const scrollTriggers = document.querySelectorAll(".js-scroll-trigger");
      const cb = function (entries, observer) {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      };
      const io = new IntersectionObserver(cb, { rootMargin: "-10% 0px" });
      scrollTriggers.forEach((trigger) => {
        io.observe(trigger);
      });

      const pageTopBtn = document.getElementById("pageTopBtn");
      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          pageTopBtn.classList.add("is-show");
        } else {
          pageTopBtn.classList.remove("is-show");
        }
      });

      // === 画像拡大（ライトボックス）と高画質読み込みの制御 ===
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxBg = document.querySelector(".lightbox-bg");
      const lightboxClose = document.querySelector(".lightbox-close");
      const spinner = document.querySelector(".lightbox-spinner");
      let activeImage = null;

      lightboxImg.style.visibility = "hidden";

      document.querySelectorAll(".photo-item img").forEach((img) => {
        img.addEventListener("click", (e) => {
          activeImage = e.target;
          const rect = activeImage.getBoundingClientRect();
          const highResSrc = activeImage.getAttribute("data-highres");

          lightbox.classList.add("active");
          document.body.style.overflow = "hidden";

          lightboxImg.src = activeImage.src;
          lightboxImg.style.visibility = "visible";

          lightboxImg.style.transition = "none";
          lightboxImg.style.left = rect.left + "px";
          lightboxImg.style.top = rect.top + "px";
          lightboxImg.style.width = rect.width + "px";
          lightboxImg.style.height = rect.height + "px";
          lightboxImg.style.objectFit = "cover";
          lightboxImg.style.borderRadius = "2px";

          lightboxImg.offsetHeight;

          // アニメーション時間の調整（例として0.3秒）
          lightboxImg.style.transition =
            "all 0.3s cubic-bezier(0.25, 1, 0.5, 1)";
          lightboxImg.style.left = "5vw";
          lightboxImg.style.top = "5vh";
          lightboxImg.style.width = "90vw";
          lightboxImg.style.height = "90vh";
          lightboxImg.style.objectFit = "contain";
          lightboxImg.style.borderRadius = "0px";

          if (highResSrc && highResSrc !== activeImage.src) {
            spinner.style.display = "block";
            const highResImage = new Image();
            highResImage.src = highResSrc;

            highResImage.onload = () => {
              lightboxImg.src = highResSrc;
              spinner.style.display = "none";

              // ふわっとしたオレンジの光エフェクト
              lightboxImg.style.transition = "all 0.5s ease-out";
              lightboxImg.style.transform = "scale(1.015)";
              lightboxImg.style.boxShadow = "0 0 100px rgba(255, 77, 0, 0.7)";

              setTimeout(() => {
                lightboxImg.style.transition = "all 0.5s ease-in-out";
                lightboxImg.style.transform = "scale(1)";
                lightboxImg.style.boxShadow = "0 0 0px rgba(255, 77, 0, 0)";
              }, 500);
            };
          }
        });
      });

      function closeLightbox() {
        if (!activeImage) return;

        const rect = activeImage.getBoundingClientRect();

        lightboxBg.style.opacity = "0";
        lightboxClose.style.opacity = "0";
        spinner.style.display = "none";

        lightboxImg.style.left = rect.left + "px";
        lightboxImg.style.top = rect.top + "px";
        lightboxImg.style.width = rect.width + "px";
        lightboxImg.style.height = rect.height + "px";
        lightboxImg.style.objectFit = "cover";

        setTimeout(() => {
          lightbox.classList.remove("active");
          lightboxBg.style.opacity = "";
          lightboxClose.style.opacity = "";
          lightboxImg.style.visibility = "hidden";
          document.body.style.overflow = "";
          activeImage = null;
        }, 300); // アニメーション時間（0.3秒）と合わせる
      }

      lightboxBg.addEventListener("click", closeLightbox);
      lightboxClose.addEventListener("click", closeLightbox);
      lightboxImg.addEventListener("click", closeLightbox);
      // --- ヘッダーのスクロール（自動隠し）制御 ---
      const header = document.querySelector("header");
      let lastScrollY = window.scrollY;

      window.addEventListener("scroll", () => {
        const currentScrollY = window.scrollY;
        if (Math.abs(currentScrollY - lastScrollY) < 60) {
          return;
        }
        // 下にスクロール ＆ 上から50px以上スクロールしている場合のみ隠す
        if (currentScrollY > lastScrollY && currentScrollY > 50) {
          header.style.top = "-150px"; // ヘッダーの高さ分、画面外（上）に移動させる
        } else {
          // 上に少しでもスクロールした時、または一番上の時は表示する
          header.style.top = "0px";
        }

        lastScrollY = currentScrollY;
      });
    </script>
